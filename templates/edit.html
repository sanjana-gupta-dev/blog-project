<!DOCTYPE html>
<html>
<body>

<h2>Edit Post ✏️</h2>

<form method="post">
    {% csrf_token %}

    <input type="text" name="title" value="{{ post.title }}"><br><br>

    <input type="text" name="content" value="{{ post.content }}"><br><br>

    <button type="submit">Update</button>
</form>

</body>
</html>
